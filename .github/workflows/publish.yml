name: Publish to PyPI

# Publishes on a version tag, e.g. `git tag v0.1.0 && git push --tags`.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in secrets.
# One-time setup: on PyPI, add a trusted publisher for this repo pointing at
# this workflow (environment: pypi).

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
